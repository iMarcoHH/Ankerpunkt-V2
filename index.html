<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#0D1B2A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ankerpunkt" />
    <meta name="description" content="Dein persönlicher Finanz-Manager." />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>Ankerpunkt</title>
    <script>
      // Force reload if cached version is outdated
      const VERSION = '20260604-v4';
      if (localStorage.getItem('app-version') !== VERSION) {
        localStorage.clear();
        localStorage.setItem('app-version', VERSION);
        if (window.location.search !== '?v=' + VERSION) {
          window.location.replace(window.location.pathname + '?v=' + VERSION);
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
